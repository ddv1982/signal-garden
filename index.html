<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Signal Garden is a gentle self-reflection app for noticing inner signals, softening labels, and growing tiny acts of self-trust."
    />
    <meta name="application-name" content="Signal Garden" />
    <meta name="theme-color" content="#365e4a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" sizes="any" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#365e4a" />
    <meta property="og:title" content="Signal Garden" />
    <meta
      property="og:description"
      content="A gentle self-reflection app for noticing inner signals, softening labels, and growing tiny acts of self-trust."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Signal Garden" />
    <meta
      name="twitter:description"
      content="A gentle self-reflection app for noticing inner signals, softening labels, and growing tiny acts of self-trust."
    />
    <script>
      (function () {
        try {
          var preference = 'system';
          var rawPreference = localStorage.getItem('signal-garden/theme-preference/vite/v1');
          if (rawPreference === 'light' || rawPreference === 'dark' || rawPreference === 'system') {
            preference = rawPreference;
          } else if (rawPreference === null) {
            var rawSettings = localStorage.getItem('signal-garden/settings/vite/v1');
            if (rawSettings) {
              var settings = JSON.parse(rawSettings);
              var validSettings =
                settings &&
                typeof settings === 'object' &&
                !Array.isArray(settings) &&
                typeof settings.reducedMotion === 'boolean' &&
                (settings.onboardingCompleted === undefined ||
                  typeof settings.onboardingCompleted === 'boolean');
              if (
                validSettings &&
                (settings.themePreference === 'light' ||
                  settings.themePreference === 'dark' ||
                  settings.themePreference === 'system')
              ) {
                preference = settings.themePreference;
              }
            }
          }
          var systemTheme =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          var activeTheme = preference === 'system' ? systemTheme : preference;
          document.documentElement.dataset.theme = activeTheme;
          document.documentElement.style.colorScheme = activeTheme;
        } catch (error) {
          var fallbackTheme =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          document.documentElement.dataset.theme = fallbackTheme;
          document.documentElement.style.colorScheme = fallbackTheme;
        }
      })();
    </script>
    <title>Signal Garden</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
